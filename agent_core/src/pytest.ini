[pytest]
addopts = --import-mode=importlib
markers =
    integration_docker: tests intended for dockerized integration scenarios.
filterwarnings =
    ignore:This module has been moved to the pymatgen.*:DeprecationWarning
    ignore:Entry, ComputedEntry and ComputedStructureEntry have been moved.*:DeprecationWarning
    ignore:All compatibility have been moved to the pymatgen\.analysis\.compatibility module.*:DeprecationWarning
