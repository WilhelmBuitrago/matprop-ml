  #    test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
  #    interval: 30s
  #    timeout: 5s
  #    retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8004"
        INTERNAL_API_URL: "http://agent-core:8004"
    container_name: frontend
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8004"
      INTERNAL_API_URL: "http://agent-core:8004"
    depends_on:
      - agent-core
    networks:
      - matprop_net

networks:
  matprop_net:
    driver: bridge


volumes:
  ollama_data:
